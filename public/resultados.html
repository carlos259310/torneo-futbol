<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sist. Gestión - Resultados</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23166534' stroke='%23fff' stroke-width='3'/%3E%3Cpath d='M50 15 L62 38 L88 38 L67 54 L75 78 L50 63 L25 78 L33 54 L12 38 L38 38 Z' fill='%23f0fdf4' stroke='%23166534' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23166534'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=3.0">
    <style>
        /* ── Grid: align-items start fixes row-stretch bug ── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
            align-items: start;
        }

        /* ── Match Card ── */
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .match-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .match-win  { border-left: 4px solid #22c55e; }
        .match-draw { border-left: 4px solid #facc15; }
        .match-loss { border-left: 4px solid #ef4444; }

        /* ── Match header ── */
        .match-top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 0.25rem; }
        .match-header { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .match-date { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

        /* Result badge */
        .result-badge { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 20px; letter-spacing: .05em; text-transform: uppercase; }
        .win-badge  { background: rgba(34,197,94,0.15);  color: #16a34a; border: 1px solid #22c55e40; }
        .draw-badge { background: rgba(250,204,21,0.15); color: #b45309; border: 1px solid #facc1540; }
        .loss-badge { background: rgba(239,68,68,0.12);  color: #dc2626; border: 1px solid #ef444440; }

        /* Scoreboard */
        .scoreboard { display: flex; align-items: center; justify-content: center; gap: 1rem; width: 100%; }
        .team  { flex: 1; text-align: center; font-weight: 700; font-size: 0.92rem; }
        .score { background: #1e293b; color: white; font-size: 1.5rem; font-weight: 800; padding: 0.4rem 0.8rem; border-radius: 8px; min-width: 3rem; text-align: center; transition: background .2s; }
        .score-win  { background: linear-gradient(135deg,#16a34a,#15803d) !important; }
        .score-loss { background: linear-gradient(135deg,#dc2626,#b91c1c) !important; }
        .dark-mode .score { background: var(--primary); }

        /* Details */
        .match-details { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; border-top: 0 solid transparent; }
        .match-card.expanded .match-details { max-height: 2000px; opacity: 1; padding-top: 1rem; margin-top: 1rem; border-top: 1px solid var(--border); }
        .detail-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .detail-item { font-size: 0.8rem; padding: 4px 8px 4px 20px; border-radius: 4px; background: var(--bg-body); position: relative; margin-bottom: 4px; }
        .detail-item::before { font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; left: 6px; font-size: 0.7rem; }
        .strength-item   { border-left: 3px solid var(--success); }
        .strength-item::before   { content: "\f00c"; color: var(--success); }
        .improvement-item { border-left: 3px solid var(--danger); }
        .improvement-item::before { content: "\f06a"; color: var(--danger); }

        /* Scorer chips inside match details */
        .match-scorers-inline { margin-bottom: 0.75rem; }
        .scorer-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .scorer-chip {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.78rem; font-weight: 700;
            background: linear-gradient(135deg,rgba(34,197,94,0.15),rgba(16,185,129,0.2));
            border: 1px solid rgba(34,197,94,0.35);
            color: #15803d; padding: 3px 10px; border-radius: 20px;
        }
        .dark-mode .scorer-chip { color: #4ade80; }

        /* Toggle */
        .details-toggle { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); color: var(--primary); font-size: 0.85rem; font-weight: 700; transition: color .2s; }
        .toggle-icon { transition: transform 0.3s ease; }
        .match-card.expanded .toggle-icon { transform: rotate(180deg); }
        .match-card:hover .details-toggle { color: var(--primary-dark); }

        /* ── Win Confetti ── */
        .confetti-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .confetti-dot {
            position: absolute; top: -12px; border-radius: 50%;
            animation: confetti-fall 2.5s ease-in forwards;
        }
        @keyframes confetti-fall {
            0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(160px) rotate(540deg); opacity: 0; }
        }

        /* ── Positions Table ── */
        #positions-container {
            display: none;
            margin-bottom: 2.5rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            background: var(--bg-card);
        }
        .positions-header {
            display: flex; align-items: center; gap: 10px;
            padding: 1rem 1.2rem;
            background: linear-gradient(135deg,#2563eb,#1e3a8a);
            color: #fff;
            font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
        }
        .positions-info {
            background: rgba(59,130,246,0.05);
            color: var(--text-muted);
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .positions-info i { color: #3b82f6; font-size: 1rem; }
        .positions-table-wrap {
            overflow-x: auto;
        }
        .pos-table {
            width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem;
        }
        .pos-table th {
            padding: 0.8rem 0.4rem; background: rgba(0,0,0,0.03); color: var(--text-muted); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.05em; border-bottom: 2px solid var(--border);
        }
        .dark-mode .pos-table th { background: rgba(255,255,255,0.03); }
        .pos-table td {
            padding: 0.9rem 0.4rem; border-bottom: 1px solid var(--border); font-weight: 600;
            transition: background 0.3s;
        }
        .pos-table tr:last-child td { border-bottom: none; }
        .pos-table tbody tr { transition: background 0.2s; }
        .pos-table tbody tr:hover td { background: var(--bg-body); }
        
        .pos-team { text-align: left; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        /* default rank box */
        .pos-rank-box {
            width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
            background: var(--bg-body); color: var(--text-muted); border-radius: 6px; font-size: 0.8rem; font-weight: 900;
        }
        
        .pos-table tbody tr td:first-child { border-left: 4px solid transparent; }

        .pos-pts { font-weight: 900; color: var(--primary); font-size: 0.95rem; }
        .our-team td { background: rgba(34,197,94,0.08) !important; border-top: 1px solid rgba(34,197,94,0.3); border-bottom: 1px solid rgba(34,197,94,0.3) !important; }
        .our-team td:first-child { border-left: 4px solid #22c55e !important; }
        .our-team .pos-team { color: #15803d; }
        .dark-mode .our-team .pos-team { color: #4ade80; }

        /* ── Scorers Table (standalone below grid) ── */
        #scorers-section {
            display: none;
            margin-top: 2.5rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(34,197,94,0.3);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            background: var(--bg-card);
        }
        .scorers-header {
            display: flex; align-items: center; gap: 10px;
            padding: 1rem 1.2rem;
            background: linear-gradient(135deg,#16a34a,#065f46);
            color: #fff;
            font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
        }
        
        .scorers-table-wrap { width: 100%; overflow-x: auto; }
        .scorers-cols {
            display: grid; grid-template-columns: 60px 1fr 120px;
            padding: 0.8rem 1rem; background: rgba(0,0,0,0.03);
            border-bottom: 2px solid var(--border);
            font-size: 0.75rem; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .dark-mode .scorers-cols { background: rgba(255,255,255,0.03); }
        .sc-col-center { text-align: center; }
        .sc-col-right { text-align: right; }
        
        .scorers-list { display: flex; flex-direction: column; }
        .scorer-row {
            display: grid; grid-template-columns: 60px 1fr 120px;
            align-items: center; padding: 0.9rem 1rem;
            background: transparent; transition: background 0.2s;
            border-bottom: 1px solid var(--border);
            border-left: 4px solid transparent;
        }
        .scorer-row:last-child { border-bottom: none; }
        .scorer-row:hover { background: var(--bg-body); cursor: default; }
        
        .rank-1-scorer { background: linear-gradient(90deg, rgba(250,204,21,0.08), transparent) !important; border-left-color: #facc15; }
        .rank-2-scorer { background: linear-gradient(90deg, rgba(148,163,184,0.08), transparent) !important; border-left-color: #94a3b8; }
        .rank-3-scorer { background: linear-gradient(90deg, rgba(217,119,6,0.08), transparent) !important; border-left-color: #d97706; }

        .sc-rank-col { display: flex; align-items: center; justify-content: center; }
        .scorer-rank-box {
            width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
            background: var(--bg-body); color: var(--text-muted); border-radius: 6px; font-size: 0.9rem; font-weight: 900;
        }
        .rank-1-scorer .scorer-rank-box { background: linear-gradient(135deg, #facc15, #ca8a04); color: #fff; box-shadow: 0 2px 8px rgba(250,204,21,0.4); }
        .rank-2-scorer .scorer-rank-box { background: linear-gradient(135deg, #94a3b8, #475569); color: #fff; box-shadow: 0 2px 8px rgba(148,163,184,0.4); }
        .rank-3-scorer .scorer-rank-box { background: linear-gradient(135deg, #f59e0b, #b45309); color: #fff; box-shadow: 0 2px 8px rgba(217,119,6,0.4); }

        .sc-info-col { display: flex; flex-direction: column; gap: 2px; }
        .scorer-fullname { font-size: 0.95rem; font-weight: 800; color: var(--text); }
        .scorer-meta  { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .scorer-rating { color: #d97706; font-weight: 700; }
        .vet-badge {
            font-size: 0.6rem; font-weight: 800; padding: 2px 6px;
            background: linear-gradient(135deg,#7c3aed,#5b21b6);
            color: #fff; border-radius: 20px; vertical-align: middle;
        }
        
        .sc-goals-col { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        .scorer-balls { font-size: 0.8rem; letter-spacing: 2px; }
        .scorer-count {
            font-size: 0.85rem; font-weight: 800; color: #fff;
            background: linear-gradient(135deg,#16a34a,#065f46);
            padding: 4px 12px; border-radius: 20px;
            box-shadow: 0 2px 6px rgba(22,163,74,.35);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/#" class="nav-link"><i class="fas fa-home"></i> Inicio</a>
            <a href="#positions-container" class="nav-link"><i class="fas fa-list-ol"></i> Posiciones</a>
            <a href="#partidos-section" class="nav-link"><i class="fas fa-poll"></i> Resultados</a>
            <a href="#scorers-section" class="nav-link"><i class="fas fa-futbol"></i> Goleadores</a>
            <button class="nav-link theme-toggle" onclick="toggleDarkMode()" style="background:none; border:none; cursor:pointer;"><i class="fas fa-moon" id="theme-icon"></i></button>
        </div>
    </nav>
    <div class="container">
        <header>
            <div class="futsal-badge"><i class="fas fa-trophy"></i> TORNEO C.E.A</div>
            <h1 style="margin-bottom: 0.5rem;">Estadísticas del Torneo</h1>
        </header>
        <main>
            <!-- Sección Posiciones -->
            <div id="positions-container" style="scroll-margin-top: 80px;"></div>
            
            <!-- Sección Resultados de Partidos -->
            <div id="partidos-section" style="scroll-margin-top: 80px; margin-top: 2rem;">
                <h2 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">
                    <i class="fas fa-poll" style="color: var(--primary);"></i> Resultados de los Partidos
                </h2>
                <div id="results-grid" class="results-grid"></div>
            </div>
            
            <!-- Sección Goleadores -->
            <div id="scorers-section" style="scroll-margin-top: 80px;"></div>
        </main>
        <footer><p>Equipo de Fútbol 6 - Sistema de Gestión v2.0</p></footer>
    </div>

    <div id="ai-chat-container" class="ai-chat-container">
        <button id="ai-chat-toggle" class="ai-chat-toggle" title="DT IA">
            <i class="fas fa-robot"></i>
            <span class="chat-toggle-text">Chat IA</span>
        </button>
        <div id="ai-chat-window" class="ai-chat-window hidden">
            <div class="chat-header">
                <div class="chat-header-info">
                    <i class="fas fa-robot"></i>
                    <span>DT IA</span>
                </div>
                <div class="chat-header-actions">
                    <button id="ai-chat-close"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="ai-chat-messages" class="chat-messages">
                <div class="message assistant">
                    ¡Hola! Soy el DT IA de Tránsito de Girón. Pregúntame sobre jugadores, alineaciones, resultados o tácticas del Torneo CEA Fútbol 6.
                </div>
            </div>
            <div class="chat-input-area">
                <textarea id="ai-chat-input" placeholder="Pregúntame algo..." rows="1"></textarea>
                <button id="ai-chat-send" class="btn-primary"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="ai-chat.js?v=3.1"></script>
    <script src="results.js?v=3.1"></script>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            var isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            var icon = document.getElementById('theme-icon');
            if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (localStorage.getItem('darkMode') === 'true') { 
            document.body.classList.add('dark-mode'); 
            var icon = document.getElementById('theme-icon');
            if (icon) icon.className = 'fas fa-sun';
        }
    </script>
</body>
</html>
